# 轨迹流水线与提前预警（阶段2）
# ROI 使用归一化坐标 [0,1]，相对当前视频帧宽高。

roi:
  mode: rectangle
  # 全画面：便于 RepCount 等测试；园区部署请改为多边形或更小矩形。
  rect_norm: [0.0, 0.0, 1.0, 1.0]
  # mode: polygon 时启用，例如：
  # polygon_norm: [[0.1, 0.2], [0.9, 0.2], [0.9, 0.8], [0.1, 0.8]]

early_warning:
  # 相对「单纯进入 ROI 即报警」：此处要求停留时长 / 折返次数才升级，见 docs/pipeline_alerts.md
  dwell_warning_sec: 1.2
  dwell_alert_sec: 3.0
  reversal_alert_k: 4
  # true：首帧检测框与 ROI 有交集即报 intrusion_simple（对照实验）
  simple_intrusion_mode: false

debounce:
  cooldown_sec: 60.0
  consecutive_frames_for_escalation: 6

behavior:
  gathering:
    baseline_alpha: 0.08
    sigma_alpha: 0.08
    k_sigma: 2.5
    min_abs_count: 5
    ratio_threshold: 1.7
    smooth_window_sec: 5
    min_duration_sec: 10
    cooldown_sec: 180
    cold_start_min_duration_sec: 15
    cold_start_cooldown_sec: 300
  loitering:
    v_low_norm_per_sec: 0.008
    window_sec: 30
    dwell_time_sec: 30
    max_displacement_radius: 0.08
    effective_turn_angle_deg: 60
    effective_turn_hold_sec: 0.5
    turn_count_min_per_10s: 4
    compactness_max: 0.35
    cooldown_sec: 300
  tailgating:
    context_window_sec: 10
    gap_threshold_sec: 1.2
    group_window_sec: 4
    group_spacing_norm: 0.12
    group_direction_cosine_min: 0.9
    peak_hour_score_discount: 0.05
    score_threshold: 0.75
    cooldown_sec: 60

video:
  weights: yolov10s.pt
  conf: 0.35
  embedder_gpu: 0

# 轨迹点批量写入：每积累 N 行 flush 一次
batch_insert_frames: 400
